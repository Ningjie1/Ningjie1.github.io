<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 190" width="1200" height="190" role="img" aria-label="Publishing pipeline: content, Jekyll, GitHub Pages, visitor">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa7c7"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#011F5B" flood-opacity="0.08"/>
    </filter>
    <style>
      .card  { fill: #ffffff; stroke: #dbe2f0; stroke-width: 1.25; }
      .title { font: 700 19px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #011F5B; }
      .line  { font: 400 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #56617a; }
      .num   { font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #ffffff; }
      .lbl   { font: 500 11.5px 'SF Mono', Menlo, Consolas, monospace; fill: #8291b3; }
      .arrow { stroke: #9aa7c7; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- 1 · Content -->
  <g>
    <rect class="card" x="30" y="20" width="240" height="150" rx="14" filter="url(#shadow)"/>
    <circle cx="68" cy="60" r="15" fill="#011F5B"/>
    <text class="num" x="68" y="65" text-anchor="middle">1</text>
    <text class="title" x="94" y="66">Content</text>
    <text class="line" x="54" y="104">Markdown + YAML config</text>
    <text class="line" x="54" y="126">index &#183; publications &#183; hobbies</text>
    <text class="line" x="54" y="148">photos &amp; paper thumbnails</text>
  </g>
  <line class="arrow" x1="278" y1="95" x2="320" y2="95" marker-end="url(#ah)"/>
  <text class="lbl" x="299" y="82" text-anchor="middle">build</text>

  <!-- 2 · Jekyll -->
  <g>
    <rect class="card" x="330" y="20" width="240" height="150" rx="14" filter="url(#shadow)"/>
    <circle cx="368" cy="60" r="15" fill="#011F5B"/>
    <text class="num" x="368" y="65" text-anchor="middle">2</text>
    <text class="title" x="394" y="66">Jekyll</text>
    <text class="line" x="354" y="104">Liquid layouts &amp; includes</text>
    <text class="line" x="354" y="126">hand-tuned CSS &amp; JS</text>
    <text class="line" x="354" y="148">local preview: jekyll serve</text>
  </g>
  <line class="arrow" x1="578" y1="95" x2="620" y2="95" marker-end="url(#ah)"/>
  <text class="lbl" x="599" y="82" text-anchor="middle">git push</text>

  <!-- 3 · GitHub Pages -->
  <g>
    <rect class="card" x="630" y="20" width="240" height="150" rx="14" filter="url(#shadow)"/>
    <circle cx="668" cy="60" r="15" fill="#011F5B"/>
    <text class="num" x="668" y="65" text-anchor="middle">3</text>
    <text class="title" x="694" y="66">GitHub Pages</text>
    <text class="line" x="654" y="104">rebuilds on every push</text>
    <text class="line" x="654" y="126">zero-config deployment</text>
    <text class="line" x="654" y="148">served via global CDN</text>
  </g>
  <line class="arrow" x1="878" y1="95" x2="920" y2="95" marker-end="url(#ah)"/>
  <text class="lbl" x="899" y="82" text-anchor="middle">https</text>

  <!-- 4 · Visitor -->
  <g>
    <rect class="card" x="930" y="20" width="240" height="150" rx="14" filter="url(#shadow)"/>
    <circle cx="968" cy="60" r="15" fill="#990000"/>
    <text class="num" x="968" y="65" text-anchor="middle">4</text>
    <text class="title" x="994" y="66">Visitor</text>
    <text class="line" x="954" y="104">pure static HTML/CSS/JS</text>
    <text class="line" x="954" y="126">light &amp; dark themes</text>
    <text class="line" x="954" y="148">fast on any device</text>
  </g>
</svg>
