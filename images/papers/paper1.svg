<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#f8f9fc"/>
      <stop offset="40%" stop-color="#f0f2f8"/>
      <stop offset="100%" stop-color="#eceef6"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#c8cdd8" opacity="0.25"/>
    </pattern>
    <!-- Box colors -->
    <linearGradient id="slBg"><stop offset="0%" stop-color="#f6f7f9" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="gnBg"><stop offset="0%" stop-color="#eef9f0" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="blBg"><stop offset="0%" stop-color="#edf4ff" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="viBg"><stop offset="0%" stop-color="#f5f0ff" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="rsBg"><stop offset="0%" stop-color="#fef1f2" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="amBg"><stop offset="0%" stop-color="#fefaeb" stop-opacity="0.95"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#dots)"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap');
    text { font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'IBM Plex Mono', 'Menlo', monospace; }
    .tag { font-size: 8px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; }
    .math { font-size: 12px; font-weight: 500; }
    .math-lg { font-size: 14px; font-weight: 500; }
    .math-xl { font-size: 15px; font-weight: 600; }
    .desc { font-size: 9px; fill-opacity: 0.6; }
    .desc-solid { font-size: 9px; }
    .chip-text { font-size: 9.5px; font-weight: 500; }
    .arrow { fill: #a0aab8; }
    .result-text { font-size: 9px; font-weight: 500; fill: #3d4654; }
    .legend-text { font-size: 8px; font-weight: 500; fill: #8892a4; }
  </style>

  <!-- ═══ HEADER ═══ -->
  <text x="640" y="24" text-anchor="middle" class="mono" font-size="9" font-weight="600" letter-spacing="2.5" fill="#8892a4">METHODOLOGICAL FRAMEWORK</text>
  <text x="640" y="46" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a1f2e">Covariance-Based Symmetry Assessment &amp; Exponentiality Testing under Multiplicative Distortion</text>

  <!-- ═══ STAGE 1: Distortion Model ═══ -->
  <rect x="60" y="62" width="1160" height="72" rx="8" fill="#f6f7f9" fill-opacity="0.92" stroke="#c0c7d2" stroke-width="1.5"/>
  <!-- Step number -->
  <rect x="564" y="70" width="15" height="15" rx="4" fill="#4a5568"/>
  <text x="571.5" y="81" text-anchor="middle" class="mono" font-size="8.5" font-weight="700" fill="white">1</text>
  <text x="586" y="81" class="mono tag" fill="#4a5568">MULTIPLICATIVE DISTORTION MODEL</text>
  <!-- Section ref -->
  <text x="1205" y="76" class="mono" font-size="7.5" font-weight="600" fill="#b8c0d0">§ 1</text>
  <!-- Main formula -->
  <text x="640" y="104" text-anchor="middle" class="mono math-xl" fill="#1a1f2e">X̃ = ψ(U) · X</text>
  <!-- Description -->
  <text x="640" y="124" text-anchor="middle" class="desc" fill="#4a5568">
    <tspan font-weight="600" fill-opacity="1">X</tspan><tspan> unobservable  ·  </tspan>
    <tspan font-weight="600" fill-opacity="1">U</tspan><tspan> observable confounding  ·  </tspan>
    <tspan font-weight="600" fill-opacity="1">ψ(·)</tspan><tspan> unknown smoothing function  ·  E[ψ(U)] = 1</tspan>
  </text>

  <!-- ═══ FORK CONNECTOR ═══ -->
  <line x1="640" y1="134" x2="640" y2="142" stroke="#a0aab8" stroke-width="1.5"/>
  <line x1="320" y1="142" x2="960" y2="142" stroke="#a0aab8" stroke-width="1.5"/>
  <line x1="320" y1="142" x2="320" y2="154" stroke="#a0aab8" stroke-width="1.5"/>
  <line x1="960" y1="142" x2="960" y2="154" stroke="#a0aab8" stroke-width="1.5"/>
  <text x="320" y="164" text-anchor="middle" font-size="12" class="arrow">↓</text>
  <text x="960" y="164" text-anchor="middle" font-size="12" class="arrow">↓</text>

  <!-- Branch labels -->
  <rect x="120" y="160" width="108" height="16" rx="3" fill="#e8f8ed" stroke="#86efac" stroke-width="1"/>
  <text x="174" y="171" text-anchor="middle" class="mono" font-size="8" font-weight="600" fill="#137333">Path A · ψ(U) = 1</text>
  <rect x="1038" y="160" width="112" height="16" rx="3" fill="#edf4ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="1094" y="171" text-anchor="middle" class="mono" font-size="8" font-weight="600" fill="#1a56db">Path B · ψ(U) ≠ 1</text>

  <!-- ═══ STAGE 2A: Direct λ Estimation (Path A) ═══ -->
  <rect x="60" y="172" width="580" height="120" rx="8" fill="#eef9f0" fill-opacity="0.92" stroke="#60c880" stroke-width="1.5"/>
  <rect x="74" y="180" width="15" height="15" rx="4" fill="#137333"/>
  <text x="81.5" y="191" text-anchor="middle" class="mono" font-size="8.5" font-weight="700" fill="white">2a</text>
  <text x="98" y="191" class="mono tag" fill="#137333">DIRECT λ ESTIMATION</text>
  <text x="626" y="186" class="mono" font-size="7.5" font-weight="600" fill="#b8c0d0">§ 2</text>
  <text x="78" y="210" class="mono math" fill="#0d4f22">X observed directly — four estimators:</text>
  <!-- Chips row 1 -->
  <rect x="78" y="218" width="96" height="20" rx="4" fill="#ddf5e3" stroke="#a3e4b5" stroke-width="1"/>
  <text x="126" y="232" text-anchor="middle" class="mono chip-text" fill="#0d4f22">λ̂₁ = X̄ (MLE)</text>
  <rect x="180" y="218" width="158" height="20" rx="4" fill="#ddf5e3" stroke="#a3e4b5" stroke-width="1"/>
  <text x="259" y="232" text-anchor="middle" class="mono chip-text" fill="#0d4f22">λ̂₂ = Σlog(Xᵢ)(Xᵢ−X̄)/n</text>
  <rect x="344" y="218" width="88" height="20" rx="4" fill="#ddf5e3" stroke="#a3e4b5" stroke-width="1"/>
  <text x="388" y="232" text-anchor="middle" class="mono chip-text" fill="#0d4f22">λ̂₃ = 1/(2f̄)</text>
  <!-- Star chip -->
  <rect x="438" y="218" width="112" height="20" rx="4" fill="#ccf2d6" stroke="#4ade80" stroke-width="1"/>
  <text x="494" y="232" text-anchor="middle" class="mono chip-text" fill="#0d4f22">λ̂₄ = Σ(1−F̂)/f̂/n</text>
  <text x="546" y="214" font-size="10" fill="#f59e0b">★</text>
  <!-- Description -->
  <text x="78" y="258" class="desc" fill="#0d4f22">
    <tspan font-weight="600" fill-opacity="1">λ̂₄</tspan><tspan> : MLE-level efficiency (Var = λ²) · </tspan>
    <tspan font-weight="600" fill-opacity="1">λ̂₃ , λ̂₄</tspan><tspan> robust to outliers</tspan>
  </text>
  <!-- Theorem ref -->
  <text x="78" y="278" class="desc" fill="#0d4f22">
    <tspan font-weight="600" fill-opacity="1">Thm 1:</tspan><tspan> √n(λ̂₃ − λ) → N(0, 4λ²/3),  √n(λ̂₄ − λ) → N(0, λ²)</tspan>
  </text>

  <!-- ═══ STAGE 2B: CMC (Path B) ═══ -->
  <rect x="656" y="172" width="564" height="120" rx="8" fill="#edf4ff" fill-opacity="0.92" stroke="#7fadee" stroke-width="1.5"/>
  <rect x="670" y="180" width="15" height="15" rx="4" fill="#1a56db"/>
  <text x="677.5" y="191" text-anchor="middle" class="mono" font-size="8.5" font-weight="700" fill="white">2b</text>
  <text x="694" y="191" class="mono tag" fill="#1a56db">CONDITIONAL MEAN CALIBRATION</text>
  <text x="1206" y="186" class="mono" font-size="7.5" font-weight="600" fill="#b8c0d0">§ 3</text>
  <text x="674" y="214" class="mono math" fill="#1e3a6e">ψ̂(U) = Ê(X̃|U) / X̄̃   →   X̂_C,i = X̃ᵢ / ψ̂_C(Uᵢ)</text>
  <text x="674" y="232" class="desc" fill="#1e3a6e">Nadaraya-Watson kernel estimator · E[ψ(U)] = 1 identifiability</text>
  <!-- CMC chips -->
  <rect x="674" y="242" width="128" height="20" rx="4" fill="#dce8fd" stroke="#96b8f0" stroke-width="1"/>
  <text x="738" y="256" text-anchor="middle" class="mono chip-text" fill="#1e3a6e">λ̂_C,1 = 1/(2f̄_C)</text>
  <rect x="808" y="242" width="158" height="20" rx="4" fill="#dce8fd" stroke="#96b8f0" stroke-width="1"/>
  <text x="887" y="256" text-anchor="middle" class="mono chip-text" fill="#1e3a6e">λ̂_C,2 = Σ(1−F̂_C)/f̂_C/n</text>
  <!-- Theorem ref -->
  <text x="674" y="280" class="desc" fill="#1e3a6e">
    <tspan font-weight="600" fill-opacity="1">Thm 4:</tspan><tspan> Extra variance 2λ²Var(ψ(U)) from distortion calibration</tspan>
  </text>

  <!-- ═══ MERGE CONNECTOR ═══ -->
  <line x1="320" y1="292" x2="320" y2="300" stroke="#a0aab8" stroke-width="1.5"/>
  <line x1="960" y1="292" x2="960" y2="300" stroke="#a0aab8" stroke-width="1.5"/>
  <line x1="320" y1="300" x2="960" y2="300" stroke="#a0aab8" stroke-width="1.5"/>
  <line x1="640" y1="300" x2="640" y2="312" stroke="#a0aab8" stroke-width="1.5"/>
  <text x="640" y="322" text-anchor="middle" font-size="12" class="arrow">↓</text>

  <!-- ═══ STAGE 3: Exponential Transform ═══ -->
  <rect x="60" y="324" width="1160" height="58" rx="8" fill="#f5f0ff" fill-opacity="0.92" stroke="#a88de8" stroke-width="1.5"/>
  <rect x="564" y="332" width="15" height="15" rx="4" fill="#5b2dae"/>
  <text x="571.5" y="343" text-anchor="middle" class="mono" font-size="8.5" font-weight="700" fill="white">3</text>
  <text x="586" y="343" class="mono tag" fill="#5b2dae">EXPONENTIAL TRANSFORM</text>
  <text x="640" y="365" text-anchor="middle" class="mono math-lg" fill="#3d1a80">V̂_s,i = exp(−X̂ᵢ / λ̂_s)      Under H₀ : X ~ Exp(λ) ⟹ V ~ U(0,1)      f̂_V(v) &amp; F̂_V(v) nonparametric</text>

  <!-- Arrow -->
  <text x="640" y="396" text-anchor="middle" font-size="14" class="arrow">↓</text>

  <!-- ═══ STAGE 4: Covariance Measure ═══ -->
  <rect x="60" y="400" width="1160" height="108" rx="8" fill="#fef1f2" fill-opacity="0.92" stroke="#ef8f9a" stroke-width="1.5"/>
  <rect x="540" y="408" width="15" height="15" rx="4" fill="#b91c3a"/>
  <text x="547.5" y="419" text-anchor="middle" class="mono" font-size="8.5" font-weight="700" fill="white">4</text>
  <text x="562" y="419" class="mono tag" fill="#b91c3a">COVARIANCE-BASED SYMMETRY MEASURE</text>
  <!-- Main formula -->
  <text x="640" y="448" text-anchor="middle" class="mono" font-size="17" font-weight="600" fill="#7f1128">ℵ₀.₅ = Cov( f_S^0.5(S),  F_S(S) )</text>
  <!-- Description -->
  <text x="640" y="468" text-anchor="middle" class="desc-solid" fill="#7f1128">S = F(X)  ·  Handles uniform f_S where ρ₀.₅ undefined  ·  Estimators: <tspan font-weight="600">ℵ̂₀.₅,s</tspan> (s = 1–4)  &amp;  <tspan font-weight="600">ℵ̂_C,0.5,s</tspan> (s = 1,2)</text>
  <!-- Hypothesis chips -->
  <rect x="388" y="478" width="182" height="22" rx="4" fill="#fde8e9" stroke="#f5a0a8" stroke-width="1"/>
  <text x="479" y="493" text-anchor="middle" class="mono" font-size="9.5" font-weight="500" fill="#7f1128">H₀ (exponential) : ℵ₀.₅ = 0</text>
  <rect x="580" y="478" width="200" height="22" rx="4" fill="#fef6dd" stroke="#fcd34d" stroke-width="1"/>
  <text x="680" y="493" text-anchor="middle" class="mono" font-size="9.5" font-weight="500" fill="#6b3f07">H₁ (not exponential) : ℵ₀.₅ ≠ 0</text>

  <!-- Arrow -->
  <text x="640" y="524" text-anchor="middle" font-size="14" class="arrow">↓</text>

  <!-- ═══ STAGE 5: Empirical Likelihood ═══ -->
  <rect x="60" y="528" width="1160" height="58" rx="8" fill="#fefaeb" fill-opacity="0.92" stroke="#e8be3c" stroke-width="1.5"/>
  <rect x="540" y="536" width="15" height="15" rx="4" fill="#92590e"/>
  <text x="547.5" y="547" text-anchor="middle" class="mono" font-size="8.5" font-weight="700" fill="white">5</text>
  <text x="562" y="547" class="mono tag" fill="#92590e">EMPIRICAL LIKELIHOOD INFERENCE</text>
  <text x="640" y="572" text-anchor="middle" class="mono math-lg" fill="#6b3f07">ℓ̂_n(ℵ₀.₅) →  χ²₁      Reject H₀ if 0 ∉ CI      No pre-specified λ      CMC: ℓ̂_C,n,s → χ²₁</text>

  <!-- Arrow -->
  <text x="640" y="604" text-anchor="middle" font-size="14" class="arrow">↓</text>

  <!-- ═══ RESULTS STRIP ═══ -->
  <!-- Tag 1 -->
  <rect x="230" y="610" width="118" height="24" rx="5" fill="white" fill-opacity="0.8" stroke="#dfe3ea" stroke-width="1"/>
  <text x="242" y="626" font-size="11" font-weight="700" fill="#f59e0b">★</text>
  <text x="256" y="626" class="result-text">λ̂₄ MLE-efficient</text>
  <!-- Tag 2 -->
  <rect x="356" y="610" width="136" height="24" rx="5" fill="white" fill-opacity="0.8" stroke="#dfe3ea" stroke-width="1"/>
  <text x="368" y="626" font-size="11" font-weight="700" fill="#16a34a">✓</text>
  <text x="382" y="626" class="result-text">λ̂₃, λ̂₄ outlier-robust</text>
  <!-- Tag 3 -->
  <rect x="500" y="610" width="158" height="24" rx="5" fill="white" fill-opacity="0.8" stroke="#dfe3ea" stroke-width="1"/>
  <text x="512" y="626" font-size="11" font-weight="700" fill="#16a34a">✓</text>
  <text x="526" y="626" class="result-text">CMC eliminates distortion</text>
  <!-- Tag 4 -->
  <rect x="666" y="610" width="158" height="24" rx="5" fill="white" fill-opacity="0.8" stroke="#dfe3ea" stroke-width="1"/>
  <text x="678" y="626" font-size="11" font-weight="700" fill="#16a34a">✓</text>
  <text x="692" y="626" class="result-text">Same variance ± distortion</text>
  <!-- Tag 5 -->
  <rect x="832" y="610" width="112" height="24" rx="5" fill="white" fill-opacity="0.8" stroke="#dfe3ea" stroke-width="1"/>
  <text x="844" y="626" font-size="11" font-weight="700" fill="#16a34a">✓</text>
  <text x="858" y="626" class="result-text">EL CIs validated</text>

  <!-- ═══ LEGEND ═══ -->
  <line x1="408" y1="656" x2="432" y2="656" stroke="#60c880" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="438" y="660" class="mono legend-text">Path A — no distortion ψ(U) = 1 (§ 2)</text>
  <line x1="688" y1="656" x2="712" y2="656" stroke="#7fadee" stroke-width="2"/>
  <text x="718" y="660" class="mono legend-text">Path B — with distortion ψ(U) ≠ 1 (§ 3)</text>

  <!-- ═══ Theorem convergence note ═══ -->
  <text x="640" y="685" text-anchor="middle" class="mono" font-size="7.5" font-weight="500" fill="#b0b8c8">Thm 5: ℵ̂_C,0.5,s under H₀ are asymptotically efficient — same variance as without distortion (§ 2 vs § 3)</text>
</svg>
